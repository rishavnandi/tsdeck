services:
  stump:
    image: aaronosher/stump:latest
    container_name: stump
    environment:
      - TZ=${TZ}
    volumes:
      - stump-config:/config
      - ${DATA_DIR}:/data
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "stump"
      tsdproxy.port.1: "443/https:10801/http"
    restart: always

volumes:
  stump-config:
