name: Affine
description: AFFiNE is a next-generation collaborative knowledge base and workspace that merges note-taking, document editing, and whiteboarding into a single, unified local-first tool.
category: documents
icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/affine.png
warnings:
  - Requires a PostgreSQL database and a Redis server, which are automatically deployed as part of this stack.
  - Large-scale document indexing and heavy media assets might require moderate CPU and memory.
required_env_vars:
  - name: TZ
    description: Timezone for the containers
    default: Europe/Amsterdam
  - name: AFFINE_SERVER_EXTERNAL_URL
    description: External URL of the AFFiNE server (e.g. https://affine.<tailnet-name>.ts.net)
    default: https://affine.tailnet.ts.net
