services:
  bentopdf:
    image: ghcr.io/alam00000/bentopdf:latest
    container_name: bentopdf
    environment:
      - TZ=${TZ}
    volumes:
      - bentopdf-config:/config
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "bentopdf"
      tsdproxy.port.1: "443/https:80/http"
    restart: always

volumes:
  bentopdf-config:
