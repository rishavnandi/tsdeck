services:
  unmanic:
    image: josh5/unmanic:latest
    container_name: unmanic
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - unmanic-config:/config
      - ${DATA_DIR}:/data
      - /tmp:/tmp/unmanic
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "unmanic"
      tsdproxy.port.1: "443/https:8888/http"
    restart: always

volumes:
  unmanic-config:
