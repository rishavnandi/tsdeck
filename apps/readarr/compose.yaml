services:
  readarr:
    image: lscr.io/linuxserver/readarr:develop
    container_name: readarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - readarr-config:/config
      - ${DATA_DIR}:/data
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "readarr"
      tsdproxy.port.1: "443/https:8787/http"
    restart: always

volumes:
  readarr-config:
