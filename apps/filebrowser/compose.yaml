services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    environment:
      - FB_DATABASE=/database/filebrowser.db
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - filebrowser-db:/database
      - ${DATA_DIR}:/srv
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "filebrowser"
    restart: always

volumes:
  filebrowser-db:
