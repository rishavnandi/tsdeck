configs:
  kaneo-nginx-config:
    content: |
      server {
          listen 80;
          location /api/ {
              proxy_pass http://kaneo-backend:1337/api/;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
          }
          location / {
              proxy_pass http://kaneo-frontend:5173/;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
          }
      }

services:
  kaneo:
    image: nginx:alpine
    container_name: kaneo
    configs:
      - source: kaneo-nginx-config
        target: /etc/nginx/conf.d/default.conf
    depends_on:
      - kaneo-frontend
      - kaneo-backend
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "kaneo"
    restart: always

  kaneo-frontend:
    image: ghcr.io/usekaneo/web:latest
    container_name: kaneo-frontend
    environment:
      - TZ=${TZ}
      - KANEO_API_URL=${KANEO_API_URL}
      - KANEO_CLIENT_URL=${KANEO_CLIENT_URL}
    depends_on:
      - kaneo-backend
    restart: always

  kaneo-backend:
    image: ghcr.io/usekaneo/api:latest
    container_name: kaneo-backend
    environment:
      - TZ=${TZ}
      - DATABASE_URL=postgresql://kaneo:kaneo_password@kaneo-db:5432/kaneo
      - AUTH_SECRET=generate-a-secure-better-auth-secret-key-32-chars
      - KANEO_API_URL=${KANEO_API_URL}
      - KANEO_CLIENT_URL=${KANEO_CLIENT_URL}
      - BETTER_AUTH_TRUSTED_PROXIES=0.0.0.0/0
    depends_on:
      kaneo-db:
        condition: service_healthy
    restart: always

  kaneo-db:
    image: postgres:16-alpine
    container_name: kaneo-db
    environment:
      - POSTGRES_USER=kaneo
      - POSTGRES_PASSWORD=kaneo_password
      - POSTGRES_DB=kaneo
    volumes:
      - kaneo-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kaneo"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  kaneo-db-data:
