services:
  ferretdb:
    image: ghcr.io/ferretdb/ferretdb:1
    container_name: ferretdb
    environment:
      - FERRETDB_HANDLER=sqlite
    volumes:
      - ferretdb-state:/state
    restart: always

  komodo-core:
    image: ghcr.io/moghtech/komodo-core:latest
    container_name: komodo-core
    environment:
      - TZ=${TZ}
      - KOMODO_DATABASE_ADDRESS=ferretdb:27017
      - KOMODO_PASSKEY=${KOMODO_PASSKEY}
      - KOMODO_JWT_SECRET=${KOMODO_JWT_SECRET}
      - KOMODO_WEBHOOK_SECRET=tsdeck_komodo_webhook_secret
      - KOMODO_TITLE=Komodo
      - KOMODO_FIRST_SERVER=http://komodo-periphery:8120
      - KOMODO_LOCAL_AUTH=true
    volumes:
      - komodo-repo-cache:/repo-cache
    depends_on:
      - ferretdb
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "komodo"
    restart: always

  komodo-periphery:
    image: ghcr.io/moghtech/komodo-periphery:latest
    container_name: komodo-periphery
    environment:
      - PERIPHERY_PASSKEYS=${KOMODO_PASSKEY}
      - PERIPHERY_ROOT_DIRECTORY=/komodo/
      - PERIPHERY_REPO_DIR=/komodo/repo
      - PERIPHERY_STACK_DIR=/komodo/stacks
      - PERIPHERY_SSL_ENABLED=false
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /proc:/proc
      - komodo-periphery-data:/komodo
    restart: always

volumes:
  ferretdb-state:
  komodo-repo-cache:
  komodo-periphery-data:
