services:
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    volumes:
      - dozzle-data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "dozzle"
      tsdproxy.port.1: "443/https:8080/http"
    restart: always

volumes:
  dozzle-data:
