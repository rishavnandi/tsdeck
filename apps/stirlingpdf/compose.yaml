services:
  stirlingpdf:
    image: frooodle/s-pdf:latest
    container_name: stirlingpdf
    environment:
      - DOCKER_ENABLE_SECURITY=false
      - INSTALL_BOOK_AND_ADVANCED_HTML_OPS=false
      - LANGS=en_GB
      - TZ=${TZ}
    volumes:
      - stirlingpdf-training:/usr/share/tessdata
      - stirlingpdf-extra:/configs
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "stirlingpdf"
      tsdproxy.port.1: "443/https:8080/http"
    restart: always

volumes:
  stirlingpdf-training:
  stirlingpdf-extra:
