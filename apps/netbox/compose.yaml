services:
  netbox:
    image: docker.io/netboxcommunity/netbox:latest
    container_name: netbox
    environment:
      - TZ=${TZ}
      - SECRET_KEY=change-me-please-secret-key
      - DB_HOST=netbox-postgres
      - DB_NAME=netbox
      - DB_USER=netbox
      - DB_PASSWORD=netbox_password
      - REDIS_HOST=netbox-redis
      - REDIS_PASSWORD=netbox_redis_password
      - REDIS_DATABASE=0
      - REDIS_CACHE_HOST=netbox-redis-cache
      - REDIS_CACHE_PASSWORD=netbox_redis_password
      - REDIS_CACHE_DATABASE=1
      - SKIP_SUPERUSER=true
      - CORS_ORIGIN_ALLOW_ALL=True
    volumes:
      - netbox-media:/opt/netbox/netbox/media
      - netbox-reports:/opt/netbox/netbox/reports
      - netbox-scripts:/opt/netbox/netbox/scripts
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "netbox"
      tsdproxy.port.1: "443/https:8000/http"
    depends_on:
      netbox-postgres:
        condition: service_healthy
      netbox-redis:
        condition: service_healthy
      netbox-redis-cache:
        condition: service_healthy
    restart: always

  netbox-worker:
    image: docker.io/netboxcommunity/netbox:latest
    container_name: netbox-worker
    environment:
      - TZ=${TZ}
      - SECRET_KEY=change-me-please-secret-key
      - DB_HOST=netbox-postgres
      - DB_NAME=netbox
      - DB_USER=netbox
      - DB_PASSWORD=netbox_password
      - REDIS_HOST=netbox-redis
      - REDIS_PASSWORD=netbox_redis_password
      - REDIS_DATABASE=0
      - REDIS_CACHE_HOST=netbox-redis-cache
      - REDIS_CACHE_PASSWORD=netbox_redis_password
      - REDIS_CACHE_DATABASE=1
    command:
      - /opt/netbox/venv/bin/python
      - /opt/netbox/netbox/manage.py
      - rqworker
    depends_on:
      netbox:
        condition: service_healthy
    restart: always

  netbox-postgres:
    image: docker.io/postgres:17-alpine
    container_name: netbox-postgres
    environment:
      - TZ=${TZ}
      - POSTGRES_DB=netbox
      - POSTGRES_USER=netbox
      - POSTGRES_PASSWORD=netbox_password
    volumes:
      - netbox-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -q -t 2 -d $$POSTGRES_DB -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  netbox-redis:
    image: docker.io/valkey/valkey:8.1-alpine
    container_name: netbox-redis
    command: valkey-server --appendonly yes --requirepass netbox_redis_password
    volumes:
      - netbox-redis-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "--pass", "netbox_redis_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  netbox-redis-cache:
    image: docker.io/valkey/valkey:8.1-alpine
    container_name: netbox-redis-cache
    command: valkey-server --requirepass netbox_redis_password
    volumes:
      - netbox-redis-cache-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "--pass", "netbox_redis_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  netbox-media:
  netbox-reports:
  netbox-scripts:
  netbox-postgres-data:
  netbox-redis-data:
  netbox-redis-cache-data:
