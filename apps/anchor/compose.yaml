services:
  anchor:
    image: ghcr.io/zhfahim/anchor:latest
    container_name: anchor
    environment:
      - TZ=${TZ}
    volumes:
      - anchor-data:/data
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "anchor"
      tsdproxy.port.1: "443/https:80/http"
    restart: always

volumes:
  anchor-data:
