services:
  tracktor:
    image: javedhdev/tracktor:latest
    container_name: tracktor
    environment:
      - TZ=${TZ}
      - TRACKTOR_DEMO_MODE=${TRACKTOR_DEMO_MODE}
      - FORCE_DATA_SEED=${TRACKTOR_FORCE_DATA_SEED}
      - CORS_ORIGINS=${TRACKTOR_CORS_ORIGINS}
    volumes:
      - tracktor-data:/data
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "tracktor"
      tsdproxy.port.1: "443/https:3000/http"
    restart: always

volumes:
  tracktor-data:
