services:
  glance:
    image: glanceapp/glance:latest
    container_name: glance
    environment:
      - TZ=${TZ}
    volumes:
      - glance-data:/app/config
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "glance"
      tsdproxy.port.1: "443/https:8080/http"
    restart: always

volumes:
  glance-data:
