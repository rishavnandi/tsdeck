services:
  isley:
    image: dwot/isley:latest
    container_name: isley
    environment:
      - TZ=${TZ}
    volumes:
      - isley-db:/app/data
      - isley-uploads:/app/uploads
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "isley"
      tsdproxy.port.1: "443/https:3000/http"
    restart: always

volumes:
  isley-db:
  isley-uploads:
