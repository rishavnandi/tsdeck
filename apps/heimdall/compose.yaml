services:
  heimdall:
    image: lscr.io/linuxserver/heimdall:latest
    container_name: heimdall
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - heimdall-config:/config
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "heimdall"
      tsdproxy.port.1: "443/https:80/http"
    restart: always

volumes:
  heimdall-config:
