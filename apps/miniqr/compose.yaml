services:
  miniqr:
    image: docker.io/ghcr.io/lyqht/mini-qr:latest
    container_name: miniqr
    environment:
      - TZ=${TZ}
      - PUID=1000
      - PGID=1000
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "miniqr"
      tsdproxy.port.1: "443/https:4173/http"
    restart: always
