services:
  guacamole:
    image: jasonrivers/nginx-guacamole:latest
    container_name: guacamole
    environment:
      - TZ=${TZ}
    volumes:
      - guacamole-config:/config
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "guacamole"
      tsdproxy.port.1: "443/https:8080/http"
    restart: always

volumes:
  guacamole-config:
