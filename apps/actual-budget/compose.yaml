services:
  actual-budget:
    image: docker.io/actualbudget/actual-server:latest
    container_name: actual-budget
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - actual-budget-data:/data
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "actual-budget"
      tsdproxy.port.1: "443/https:5006/http"
    restart: always

volumes:
  actual-budget-data:
