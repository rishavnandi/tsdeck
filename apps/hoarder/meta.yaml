name: Hoarder
description: Hoarder is a self-hosted bookmarking application designed for saving and organizing links, articles, PDF files, and custom notes. It features a modern interface, auto-tagging using local/external AI models, full-text search, and automated page archiving/screenshot capture using headless Chrome.
category: bookmarks
icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/hoarder.png
warnings:
  - Running automated Chrome archiving jobs and Meilisearch full-text indexing can be memory and CPU intensive.
  - Make sure both Meilisearch master key and NextAuth secrets are randomly generated and securely stored.
required_env_vars:
  - name: TZ
    description: Timezone for the container
    default: Europe/Amsterdam
  - name: HOARDER_NEXTAUTH_URL
    description: Fully qualified public URL of your Hoarder instance (used for authentication redirects)
    default: http://localhost:3000
