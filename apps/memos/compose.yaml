services:
  memos:
    image: neosmemo/memos:stable
    container_name: memos
    environment:
      MEMOS_PORT: 5230
      MEMOS_DRIVER: sqlite
    volumes:
      - memos-data:/var/opt/memos
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "memos"
      tsdproxy.port.1: "443/https:5230/http"
    restart: always

volumes:
  memos-data:
