services:
  karakeep:
    image: ghcr.io/karakeep-app/karakeep:release
    container_name: karakeep
    environment:
      - TZ=${TZ}
      - MEILI_ADDR=http://karakeep-meilisearch:7700
      - BROWSER_WEB_URL=http://karakeep-chrome:9222
      - NEXTAUTH_SECRET=generate-a-secure-nextauth-secret-key-32-chars
      - MEILI_MASTER_KEY=generate-a-secure-meili-master-key-string
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - DATA_DIR=/data
      - MAX_ASSET_SIZE_MB=${MAX_ASSET_SIZE_MB:-50}
      - DISABLE_SIGNUPS=${DISABLE_SIGNUPS:-false}
      - DISABLE_PASSWORD_AUTH=${DISABLE_PASSWORD_AUTH:-false}
    volumes:
      - karakeep-data:/data
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "karakeep"
    depends_on:
      karakeep-meilisearch:
        condition: service_healthy
      karakeep-chrome:
        condition: service_started
    restart: always

  karakeep-chrome:
    image: gcr.io/zenika-hub/alpine-chrome:123
    container_name: karakeep-chrome
    command:
      - --no-sandbox
      - --disable-gpu
      - --disable-dev-shm-usage
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
      - --hide-scrollbars
    restart: always

  karakeep-meilisearch:
    image: getmeili/meilisearch:v1.11.1
    container_name: karakeep-meilisearch
    environment:
      - MEILI_MASTER_KEY=generate-a-secure-meili-master-key-string
      - MEILI_NO_ANALYTICS=true
    volumes:
      - karakeep-meili-data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  karakeep-data:
  karakeep-meili-data:
